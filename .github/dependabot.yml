# Dependabot configuration — keeps dependencies current across the monorepo.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Root GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Node apps
  - package-ecosystem: "npm"
    directory: "/apps/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/apps/fan-pwa"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Python apps
  - package-ecosystem: "pip"
    directory: "/apps/orchestrator"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/apps/simulator"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/apps/counterfactual"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/apps/orchestrator"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/apps/simulator"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/apps/counterfactual"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/apps/frontend"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/apps/fan-pwa"
    schedule:
      interval: "monthly"
